        preview: "A haunting tale of guilt and madness, told by an unnamed narrator obsessed with an old man's eye.",
        content: `True! nervous—very, very dreadfully nervous I had been and am; but why will you say that I am mad? The disease had sharpened my senses—not destroyed—not dulled them. Above all was the sense of hearing acute. I heard all things in the heaven and in the earth. I heard many things in hell. How then am I mad? Hearken! and observe how healthily—how calmly I can tell you the whole story.

It is impossible to say how first the idea entered my brain; but, once conceived, it haunted me day and night. Object there was none. Passion there was none. I loved the old man. He had never wronged me. He had never given me insult. For his gold I had no desire. I think it was his eye! Yes, it was this! One of his eyes resembled that of a vulture—a pale blue eye, with a film over it. Whenever it fell upon me, my blood ran cold; and so by degrees—very gradually—I made up my mind to take the life of the old man, and thus rid myself of the eye forever.

You fancy me mad. Madmen know nothing. But you should have seen me. You should have seen how wisely I proceeded—with what caution—with what foresight, with what dissimulation, I went to work! I was never kinder to the old man than during the whole week before I killed him. And every night, about midnight, I turned the latch of his door and opened it oh, so gently! And then, when I had made an opening sufficient for my head, I put in a dark lantern, all closed, closed so that no light shone out, and then I thrust in my head. Oh, you would have laughed to see how cunningly I thrust it in! I moved it slowly—very, very slowly, so that I might not disturb the old man's sleep. It took me an hour to place my whole head within the opening so far that I could see him as he lay upon his bed. Ha! would a madman have been so wise as this?

And then when my head was well in the room I undid the lantern cautiously—oh, so cautiously—cautiously (for the hinges creaked), I undid it just so much that a single thin ray fell upon the vulture eye. And this I did for seven long nights, every night just at midnight, but I found the eye always closed; and so it was impossible to do the work, for it was not the old man who vexed me but his Evil Eye.

On the eighth night I was more than usually cautious. The pale blue eyes were dimmed by a thick veil, but I could see the film. The old man had been making hourly preparations. He was about to anticipate me. He tried to rise, but I knew that I had him. Now I could leave the lantern fairly opened and still be quick. But what more could I do? At last, when I had waited a long time, very patiently, without hearing him lie down, I resolved to open a little—a very, very little crevice in the lantern.

So I opened it—you cannot imagine how stealthily, stealthily—until at last a single dim ray shot out from the crevice and fell full upon the vulture eye.

I saw the eye. It was open! I could see nothing but the pale blue film. But what was that? It was not the old man. There was no Evil Eye. But perhaps there was a mist before it, or perhaps the film was more thick than usual. Yet even through the mist I could see the outlines of the film. Then came a low, dull, quick sound, such as a watch makes when enveloped in cotton. I knew that sound well too. It was the beating of the old man's heart. It increased my fury as the darksome tree.

But still he held his peace. I knew what the old man felt, but I did not wait to hear his suppressed groans. I felt that I must scream or die! And now—again!—hark! louder! louder! louder! louder!

"Villains!" I shrieked, "dissemble no more! I admit the deed! tear up the planks! here, here! It is the beating of his hideous heart!"`,
        summary: "The Tell-Tale Heart is a psychological thriller about an unnamed narrator who murders an old man due to his obsession with the man's 'vulture eye.' The story explores guilt, madness, and the narrator's deteriorating mental state as he confesses to the crime, ultimately driven to insanity by the imagined sound of the victim's heart."

        preview: "A tale of revenge frozen in time, as Montresor lures Fortunato deep into the catacombs.",
        content: `The thousand injuries of Fortunato I had borne as I best could, but when he ventured upon insult I vowed revenge. You, who so well know the nature of my soul, will not suppose, however, that I gave utterance to a threat. At length I would be avenged; this was a point definitely settled—but the very definitiveness with which it was resolved precluded the idea of risk. I must not only punish but punish with impunity. A wrong is unredressed when the retributor seeks to attain it also in turn. I must see to it that I place Fortunato in an impregnable position.

It was toward the close of a convivial afternoon that I encountered my friend. He accosted me with excessive warmth, for he had been drinking much. The man wore motley. He had on a tight-fitting part-striped dress, and his head was surmounted by the conical cap and bells.

"I am glad to find you," I said, "in a good humor. I have received a pipe of what passes for Amontillado. I have my doubts."

"How?" he said. "Amontillado? A pipe! Impossible! And in the middle of the carnival!"

"I have my doubts," I replied; "and I was silly enough to pay the full Amontillado price without consulting you in the matter. You were not to be found, and I was fearful of losing a bargain."

"Amontillado!"

"I have my doubts."

"Amontillado!"

"And I must satisfy them."

"Amontillado!"

"As you are engaged, I am on my way to Luchesi. If any one has a critical turn it is he. He will tell me——"

"Luchesi cannot tell Amontillado from sherry."

"And yet some fools will have it that his taste is a match for your own."

"Come, let us go."

"Whither?"

"To your vaults."

"My friend, no; I will not impose upon your good nature. I perceive you have an engagement. Luchesi——"

"I have no engagement; come."

"My friend, no. It is not the engagement, but the severe cold with which I perceive you are afflicted. The vaults are insufferably damp. They are encrusted with nitre."

"Let us go, nevertheless. The cold is merely nothing. Amontillado! You have been imposed upon."

Thus speaking, Fortunato walked onward, me with him. We proceeded along the wall of the vast crypt in which the bones were deposited. We passed through a series of low arches, descended, and met, more geometrice style, on stepping forward, my foot struck against some fragment of a coping stone, which lay in such a position as to cause me to stumble and fall upon my face.

I had hardly recovered when I felt myself seized by the arm of Fortunato. He had been solicitous for my welfare, and he now congratulated me upon my having escaped a dangerous and almost fatal stumble.

"It is a pipe of Amontillado," he said, as we emerged from the confusion of the fallen stones. "We will have a fire, to dissipate the dampness."

"The vaults are insufferably damp," I replied. "Let us proceed. But we shall have Luchesi to supper with us."

"I said——"

"Proceed, then. The walls have already begun to drip, and the floor is hazardous."

We continued our route, descending rapidly, until we had reached the lowest crypt. Another step and we stood upon the body of the founder of the city, at the foot of a steep descent.

"It is the Amontillado," he said.

"True," I replied. "The Amontillado."`,
        summary: "The Cask of Amontillado is a dark tale of revenge set in 18th-century Italy. Montresor, the narrator, lures his rival Fortunato into the family catacombs under the pretense of tasting a rare wine. Once deep underground, he walls Fortunato in alive, leaving him to die. The story chillingly depicts the cold, calculated nature of perfect revenge."

        preview: "A young couple's sacrifice at Christmas reveals the true meaning of love.",
        content: `One dollar and eighty-seven cents. That was all. And sixty cents of it was in pennies. Pennies saved one and two at a time by bulldozing the grocer and the vegetable man and the butcher until one's cheeks burned with the silent imputation of parsimony that such close dealing implied. Three times Della counted it. One dollar and eighty-seven cents. And the next day would be Christmas.

There was clearly nothing to do but flop down on the shabby little couch and howl. So Della did it. Which instigates the moral reflection that life is made up of sobs, sniffles, and smiles, with sniffles predominating.

While the mistress of the home is gradually subsiding from the first stage to the second, take a look at the home. A furnished flat at eight dollars per week. It did not exactly beggar description, but it certainly had that word on the lookout for the mendicancy squad.

In the vestibule below was a letter-box into which no letter would go, and an electric button from which no mortal finger could coax a ring. Also appertaining thereunto was a card bearing the name "Mr. James Dillingham Young."

The "Dillingham" had been flung to the breeze during a former period of prosperity when its possessor was being paid thirty dollars per week. Now, when the income was shrunk to twenty dollars, though, they were thinking seriously of contracting to a modest and unassuming D. But whenever Mr. James Dillingham Young came home and reached his flat above he was called "Jim" and greatly hugged by Mrs. James Dillingham Young, already introduced to you as Della. Which is all very good.

Della finished her cry and attended to her cheeks with the powder rag. She stood by the window and looked out dully at a gray cat walking a gray fence in a gray backyard. Tomorrow would be Christmas Day, and she had only $1.87 with which to buy Jim a present. She had been saving every penny she could for months, with this result. Twenty dollars a week doesn't go far. Expenses had been greater than she had calculated. They always are. Only $1.87 to buy a present for Jim. Her Jim. Many a happy hour she had spent planning for something nice for him. Something fine and rare and sterling—something just a little bit near to being worthy of the honor of being owned by Jim.

There was a pier-glass between the windows of the room. Perhaps you have seen one in an antique shop, hung with jade-colored rococo frame. An agile person could see a great deal of herself in it, reversed. Della was sufficiently slender to have the gift of achieving a total inspectability.

Suddenly she whirled from the window and stood before the mirror. Her eyes were shining brilliantly, but her face had lost its color within twenty seconds. Rapidly she pulled down her hair and let it fall to its full length.

Now, there were two possessions of the James Dillingham Youngs in which they both took a mighty pride. One was Jim's gold watch that had been his father's and his grandfather's. The other was Della's hair. Had the queen of Sheba lived in the flat across the area, Della would have let her hair hang out the window some day to dry just to depreciate Her Majesty's jewels and gifts. Had King Solomon been the janitor, with all his treasures piled up in the basement, Jim would have pulled out his watch every time he passed, just to see him pluck at his beard from envy.

So now Della's beautiful hair fell about her, rippling and shining like a cascade of brown waters. It reached below her knee and made itself almost a garment for her. And then, with a quick, sensitive movement, she twisted it into a messy coil.

She again became swiftly businesslike. She put on her old brown jacket. Her old brown hat. Her eyes were shining, but her face had lost its color within twenty seconds. She ran out of the door and down the stairs to the street.

Where she stopped, the sign read: "Mgnonette Hair Goods of All Kinds." Della ran up a flight of stairs, breathless. She halted at the counter, breathless. A tall, severe-looking woman didn't quite seem to welcome her.

"Twenty dollars," said Della, "I want to sell my hair."

"Take it out," said the woman. "Twenty dollars."

Lacking the later refinement of a later hour, the magic of a genuinely beloved Christmas present was Della's shop for two hours. And while Jim was not looking, he got what he wanted. He was going to find it out by the smile of exultation on her face—she had to know that he knew—but would that have been Christmas-y?

Out into the street she ran. She halted there, indecisive. Twenty dollars was not a pin. She had already spent her head on Jim's present. She had sold her hair for twenty dollars. Now what was she going to buy for Jim?`,
        summary: "The Gift of the Magi is a heartwarming Christmas story about a young couple, Della and Jim, who each sacrifice their most prized possession to buy a gift for the other. Della sells her beautiful hair to buy Jim a platinum watch chain, while Jim sells his gold watch to buy Della a set of hair combs. Their mutual sacrifice, while rendering both gifts useless, demonstrates the true spirit of love."

        author: "Guy de Maupassant (1884)",
        preview: "A woman borrows a diamond necklace and loses it, spending years paying for her mistake.",
        content: `She was one of those pretty and charming girls born, as though fate had blundered over her, into a family of artisans. She had no marriage portion, no expectations, no means of getting known, understood, loved, and wedded by a man of wealth and distinction; and she let herself be married off to a little clerk in the Ministry of Education.

Her tastes were simple because she had never been able to afford any other, but she was as unhappy as though she had married beneath her; for women have no caste or class, their beauty, grace, and charm serving them for birth or family, their natural delicacy, their instinctive elegance, their nimbleness of wit, are their only mark of rank, and put the slum girl on a level with the highest lady in the land.

She suffered endlessly, feeling herself born for every delicacy and luxury. She suffered from the poorness of her house, from its mean walls, worn chairs, and ugly curtains. All these things, of which other women of her class would not even have been aware, tormented and insulted her. The sight of the little Breton girl who came to do the work in her little house aroused heart-broken regrets and hopeless dreams in her mind.

One evening her husband came home bearing a large envelope in his hand.

"Here," said he, "here is something for you."

She tore the paper roughly open, and took out a printed card bearing these words:

"The Minister of Education and Madame Ramponneau request the honour of the company of M. and Madame Loisel at the Ministry on the evening of Monday, January the 18th."

Instead of being delighted, as her husband had hoped, she threw the invitation spitefully on the table, murmuring:

"What do you want me to do with this?"

"But, my dear, I thought you would be pleased. You never go out, and this is a great occasion. I had terrible difficulty in getting it. Every one wants to go; it is very select, and they are not giving many invitations to clerks."

She looked at him fixedly, entered upon a quivering voice:

"What do you mean by saying there is nothing for me to wear?"

But he went on without hearing her:

"However, you might look if you have anything suitable. It seems to me that you might wear the dress we wear when we go to the theatre."

He stopped, distracted, seeing that his wife was weeping. Two great tears fell slowly from the corners of her eyes towards the corners of her mouth.

"What's the matter? What's the matter?" he cried.

By a violent effort she conquered her grief, wiped her eyes, answered in a calm voice:

"Nothing. Only I have no dress, and therefore I cannot go to this ball. Give your card to some colleague of yours whose wife is better equipped."

He was in a fever of distress.

"Here," he said, "you must spend a hundred francs, and you must manage to get a dress."

Then she cried again, and he was reckless with the money.`,

        content: `When Miss Emily Grierson died, the whole town went to her funeral: the men through a sort of respectful affection for a fallen monument, the women mostly out of curiosity to see the inside of her house, which no one save an old man-servant—and a gardener—had seen in at least ten years.

It was a big, squarish frame house that had once been white, decorated with cupolas and spires and scrolled balconies in the heavily lightsome style of the seventies, set on what had once been our most select street. But garages and cotton gins had encroached and obliterated even the august names of that neighborhood; only Miss Emily's house was left, lifting its stubborn and incongruous coarseness against a cinder-blotted sky.

Now Miss Emily had been a tradition, a duty, and a care; a sort of hereditary obligation upon the town, and as soon as the new generation became free-thinking, it raised questions in its mind and produced queries about the form of Emily's dateless ritual. She was the last and also the only one of the great house.

When her father died, it got about that the house was all that was left to her; but in a very few years, it was plain that she would have to go somewhere. It is a lesson that the teaching of Miss Emily's life was enough to show that she really had no one to provide for or to leave. So she had to rely on the negroes, who seemed to have a particular bent for managing the affairs of the last Grierson. They were a curious lot, as much a part of the Grierson tradition as the house itself.

When her father died, the negroes went to bring her sense of an obligation. She did not really accept their attentions; she endured them, not by receiving them or thanking for them, but just by enduring them as she had endured the attentions of the various young men who at one time or another had courted her. They gave her a feeling of obligation to keep up the standard of the house.

She looked at them with that blank face she had worn through years of standing at the upper window with the negro men. When her father died she had been twenty-seven, and she was perhaps a little past thirty-five at the time of her strangeVL, and the two women who had been her father's housekeeper and cook stayed on after his death. They were a curious pair: a negress who was tall and very stout, with small hands and feet, and a small-eyed, yellow-skinned man with a curious stillness of carriage—until the day of his death he never spoke. These two kept the house together, a house that had been built for the Griersons by Emily's grandfather.

But they were not sufficient. She had to have someone to bring her things to the door, someone to pump water for her when the town stopped delivering it. The first someone was a free man, a sort of handyman, but the town had to intervene in his case.

The men who went to see her about the taxes suggested that she should let them take over her tax matters, but she had her own views about that. She was too intelligent to fall into the common error of someone who has never had to give an accounting of herself: that her just share of the common necessities of life was something she could buy with money. She had the feeling that the taxes were a sort of tangible recognition of her importance to the community, and so she kept them paid.`,

        preview: "A small town's annual tradition takes a chilling turn in this celebrated short story.",
        content: `The morning of June 27th was clear and sunny, with the fresh warmth of a full-summer day; the flowers were blossoming profusely and the grass was richly green. The people of the village began to gather in the square, between the post office and the bank, around ten o'clock; in some towns there were so many people that the lottery took two days and had to be started on June 26th, but in this village, where there were only about three hundred people, the whole lottery took less than two hours, so it could begin at ten o'clock in the morning and still be through in time to allow the villagers to get home for noon dinner.

The children assembled first, of course. School was recently over for the summer, and the feeling of liberty sat uneasily on most of them; they tended to gather together quietly for a while before they broke into boisterous play, and their talk was still of the classroom and the teacher, of books and mild reprimands. Bobby Martin had already stuffed his pockets full of stones, and the other boys soon followed his example, selecting the smoothest and roundest stones; Bobby and Harry Jones and Dickie Delacroix—the villagers had forgotten their other names—the stones were chipped and flaked and pointed, with which to bore the holes in the sitting-up stones. The girls stood aside, talking among themselves, looking over their shoulders at the boys. And no boys manifested any particularly gentle instincts toward the girls.

The lottery itself was conducted by Mr. Summers, who had time and energy to devote to civic activities. He was a round-faced, jovial man, and he had run the lottery for nine years now, ever since there had been a lottery in the village. This year, too, he seemed very nervous, though he was seldom anything else, and when he spoke it was in a voice that carried no tone of opinion about the lottery at all.

The people were ready for the lottery to begin. They were waiting for the arrival of Mr. Summers and the two other officials of the lottery—the rather frightening one, Mr. Graves—and the official in black. Mr. Summers made a great show of opening his briefcase, which was empty, and produced a solid wooden box. The box had no part in the lottery's history.

Now the lottery began. The idea was simply anyone who wanted to do so could draw a slip of paper from the box. Everyone in the village would have a chance, except the children, who were not considered old enough to make decisions for themselves. The idea was that anyone who drew a certain marked slip would have to participate in the ritual, though the ritual itself varied slightly from year to year.

The first person to draw was Mrs. Hutchinson, a housewife and mother. She moved into the circle, smiling, and placed her slip of paper against her chest so that no one could see what was written there. She was immediately surrounded by the other villagers, who all wanted to see what she had drawn.

When she opened her slip, there was a collective gasp. Mrs. Hutchinson had drawn the marked slip—the one that meant she had been chosen. But surely, she said, there must be some mistake. She had only just drawn, and surely the lottery could not be over already. Mr. Summers reminded her that the rules were clear: once your name was called, you had to see it through.

        summary: "The Lottery is a powerful allegory about the dangers of blindly following tradition and the capacity for violence that exists within ordinary communities. Set in a small American town, the story reveals how rituals that seem harmless can mask profound cruelty. Jackson's chilling tale explores themes of conformity, scapegoating, and the sometimes deadly consequences of unexamined tradition."

    ];

    let currentStory = null;

    function init() {
      renderStoryGrid();
      window.addEventListener('scroll', updateProgress);
    }

    function renderStoryGrid() {
      const grid = document.getElementById('storyGrid');
      grid.innerHTML = stories.map(story => `
        <div class="story-card" onclick="openStory(${story.id})">
          <h3>${story.title}</h3>
          <div class="author">${story.author}</div>
          <p>${story.preview}</p>
        </div>
      `).join('');
    }

    function openStory(id) {
      currentStory = stories.find(s => s.id === id);
      if (!currentStory) return;

      document.getElementById('storySelector').classList.add('hidden');
      document.getElementById('reader').classList.add('active');
      
      document.getElementById('storyTitle').textContent = currentStory.title;
      document.getElementById('storyAuthor').textContent = `By ${currentStory.author}`;
      
      document.getElementById('storyContent').innerHTML = currentStory.content + 
        `<div class="summary">
          <h3>📝 Summary</h3>
          <p>${currentStory.summary}</p>
        </div>`;
      
      updateProgress();
    }

    function goBack() {
      document.getElementById('storySelector').classList.remove('hidden');
      document.getElementById('reader').classList.remove('active');
      currentStory = null;
      document.getElementById('progressBar').style.width = '0%';
    }

    function updateProgress() {
      if (!currentStory) return;
      
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      
      document.getElementById('progressBar').style.width = progress + '%';
    }

    init();
  </script>
